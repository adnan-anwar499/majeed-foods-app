<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance System</title>
<link rel="stylesheet" href="styles.css">

<style>
.tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: #ddd;
  cursor: pointer;
  border-radius: 5px;
}
.tab-btn.active {
  background: linear-gradient(90deg, #3b82f6, #9333ea);
  color: white;
}
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>

</head>

<body>

<h2>Maintenance System</h2>

<!-- 🔥 Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="openTab('breakdown')">Breakdown</button>
  <button class="tab-btn" onclick="openTab('pm')">PM</button>
  <button class="tab-btn" onclick="openTab('equipment')">Equipment</button>
  <button class="tab-btn" onclick="openTab('spares')">Spares</button>
</div>

<!-- Breakdown -->
<div id="breakdown" class="tab-content active">
  <h3>Breakdown Section</h3>
  <div id="breakdownList"></div>
</div>

<!-- PM -->
<div id="pm" class="tab-content">
  <h3>PM Section</h3>
  <div id="pmList"></div>
</div>

<!-- Equipment -->
<div id="equipment" class="tab-content">
  <h3>Equipment Section</h3>
  <div id="equipmentList"></div>
</div>

<!-- Spares -->
<div id="spares" class="tab-content">
  <h3>Spares Section</h3>
  <div id="spareList"></div>
</div>

<script>
function openTab(tab) {
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}
</script>

<script type="module" src="app.js"></script>

</body>
</html>
<div id="breakdown" class="tab-content active">

<h3>New Breakdown</h3>

<input type="date" id="bdDate">
<select id="bdArea">
<option>Cleaning</option>
<option>Milling</option>
</select>

<input id="bdEquipmentName" placeholder="Equipment Name">

<select id="bdEquipmentType">
<option>Motor</option>
<option>PLC Panel</option>
</select>

<select id="bdFaultType">
<option>Electrical</option>
<option>Mechanical</option>
</select>

<input id="bdFaultCode" placeholder="Fault Code">

<select id="bdPriority">
<option>High</option>
<option>Medium</option>
</select>

<select id="bdShift">
<option>A</option>
<option>B</option>
</select>

<textarea id="bdDescription"></textarea>

<button id="saveBreakdownBtn">Save</button>

<h4>Saved</h4>
<div id="breakdownList"></div>

</div>
<div id="pm" class="tab-content">

<h3>PM</h3>

<input type="date" id="pmDate">

<select id="pmArea">
<option>Cleaning</option>
</select>

<input id="pmEquipmentName">

<select id="pmFrequency">
<option>Daily</option>
<option>Monthly</option>
</select>

<select id="pmFocus">
<option>Electrical</option>
</select>

<textarea id="pmTask"></textarea>

<select id="pmStatus">
<option>Done</option>
<option>Pending</option>
</select>

<button id="savePmBtn">Save</button>

<div id="pmList"></div>

</div>
<div id="equipment" class="tab-content">

<h3>Equipment</h3>

<input id="eqName" placeholder="Name">

<select id="eqArea">
<option>Cleaning</option>
</select>

<select id="eqType">
<option>Motor</option>
</select>

<input id="eqTag">

<select id="eqCriticality">
<option>High</option>
<option>Low</option>
</select>

<input id="eqRemarks">

<button id="saveEquipmentBtn">Save</button>

<div id="equipmentList"></div>

</div>
<div id="spares" class="tab-content">

<h3>Spares</h3>

<input id="spName">

<input id="spNumber">

<select id="spForType">
<option>Motor</option>
</select>

<input type="number" id="spCurrentStock">

<input type="number" id="spMinStock">

<input id="spLocation">

<button id="saveSpareBtn">Save</button>

<div id="spareList"></div>

</div>
