<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Majeed Foods PRO Final</title>

  <link rel="stylesheet" href="styles.css">

  <!-- ✅ NEW CARD + PAGINATION CSS -->
  <style>
    .card-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card-item h4 {
      margin: 0 0 5px;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      align-items: center;
    }

    .pagination button {
      padding: 6px 12px;
      border: none;
      background: #2196F3;
      color: white;
      border-radius: 6px;
    }
  </style>

</head>

<body>

<header>
  <h2>MAJEED FOODS PVT LTD - BAHAWALPUR</h2>
  <h3>Electrical & Automation Maintenance System</h3>
</header>

<div class="container">

  <!-- DASHBOARD -->
  <section class="card">
    <h3>Dashboard Summary</h3>
    <div class="dashboard-grid">
      <div class="section-box"><strong>Open Faults</strong><p id="openFaultsCount">0</p></div>
      <div class="section-box"><strong>PM Records</strong><p id="pmDueCount">0</p></div>
      <div class="section-box"><strong>Critical Equipment</strong><p id="criticalEquipmentCount">0</p></div>
      <div class="section-box"><strong>Low Stock</strong><p id="lowStockCount">0</p></div>
    </div>
  </section>

  <!-- BREAKDOWN -->
  <section class="card">
    <h3>New Breakdown</h3>

    <label>Date</label>
    <input type="date" id="bdDate">

    <label>Area</label>
    <select id="bdArea">
      <option>Cleaning</option>
      <option>Milling</option>
      <option>Packing</option>
    </select>

    <label>Equipment Name</label>
    <input id="bdEquipmentName">

    <label>Priority</label>
    <select id="bdPriority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <label>Description</label>
    <textarea id="bdDescription"></textarea>

    <button id="saveBreakdownBtn">Save Breakdown</button>

    <h4>Saved Breakdowns</h4>
    <div id="breakdownList"></div>
  </section>

  <!-- PM -->
  <section class="card">
    <h3>Preventive Maintenance</h3>

    <input type="date" id="pmDate">

    <input id="pmEquipmentName" placeholder="Equipment">

    <select id="pmFrequency">
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

    <select id="pmStatus">
      <option>Done</option>
      <option>Pending</option>
    </select>

    <textarea id="pmTask"></textarea>

    <button id="savePmBtn">Save PM</button>

    <h4>Saved PM</h4>
    <div id="pmList"></div>
  </section>

  <!-- EQUIPMENT -->
  <section class="card">
    <h3>Equipment</h3>

    <input id="eqName" placeholder="Name">
    <input id="eqArea" placeholder="Area">

    <select id="eqCriticality">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <button id="saveEquipmentBtn">Save Equipment</button>

    <h4>Saved Equipment</h4>
    <div id="equipmentList"></div>
  </section>

  <!-- SPARES -->
  <section class="card">
    <h3>Spares</h3>

    <input id="spName" placeholder="Part Name">
    <input id="spCurrentStock" type="number" placeholder="Stock">
    <input id="spMinStock" type="number" placeholder="Min Stock">

    <button id="saveSpareBtn">Save Spare</button>

    <h4>Saved Spares</h4>
    <div id="spareList"></div>
  </section>

</div>

<!-- FIREBASE -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
